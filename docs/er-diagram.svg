<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>

  <text x="70" y="86" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    ER Diagram: Pet Shop Inventory Manager
  </text>
  <text x="70" y="122" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    One Category can contain many Products; each Product belongs to exactly one Category.
  </text>

  <g filter="url(#shadow)">
    <rect x="80" y="200" width="420" height="310" rx="24" fill="url(#card)" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="80" y="200" width="420" height="70" rx="24" fill="#0F172A"/>
    <text x="115" y="245" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
      CATEGORY
    </text>

    <text x="115" y="315" fill="#0F172A" font-family="Consolas, monospace" font-size="24" font-weight="700">
      PK
    </text>
    <text x="180" y="315" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      id : int
    </text>

    <line x1="110" y1="342" x2="470" y2="342" stroke="#E2E8F0" stroke-width="2"/>

    <text x="115" y="392" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      name : String
    </text>

    <line x1="110" y1="418" x2="470" y2="418" stroke="#E2E8F0" stroke-width="2"/>

    <text x="115" y="468" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      description : String
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="700" y="140" width="420" height="430" rx="24" fill="url(#card)" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="700" y="140" width="420" height="70" rx="24" fill="#2563EB"/>
    <text x="735" y="185" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
      PRODUCT
    </text>

    <text x="735" y="255" fill="#0F172A" font-family="Consolas, monospace" font-size="24" font-weight="700">
      PK
    </text>
    <text x="800" y="255" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      id : int
    </text>

    <line x1="730" y1="282" x2="1090" y2="282" stroke="#E2E8F0" stroke-width="2"/>

    <text x="735" y="332" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      name : String
    </text>

    <line x1="730" y1="358" x2="1090" y2="358" stroke="#E2E8F0" stroke-width="2"/>

    <text x="735" y="408" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      price : double
    </text>

    <line x1="730" y1="434" x2="1090" y2="434" stroke="#E2E8F0" stroke-width="2"/>

    <text x="735" y="484" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      quantity : int
    </text>

    <line x1="730" y1="510" x2="1090" y2="510" stroke="#E2E8F0" stroke-width="2"/>

    <text x="735" y="560" fill="#0F172A" font-family="Consolas, monospace" font-size="24" font-weight="700">
      FK
    </text>
    <text x="800" y="560" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24">
      categoryId : int
    </text>
  </g>

  <line x1="500" y1="355" x2="690" y2="355" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

  <line x1="690" y1="325" x2="690" y2="385" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <line x1="690" y1="355" x2="720" y2="335" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <line x1="690" y1="355" x2="720" y2="355" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
  <line x1="690" y1="355" x2="720" y2="375" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

  <line x1="525" y1="330" x2="525" y2="380" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>

  <text x="545" y="320" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    1
  </text>
  <text x="640" y="320" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    many
  </text>

  <text x="470" y="620" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    Relationship: Category.id = Product.categoryId
  </text>

  <rect x="430" y="650" width="340" height="50" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="456" y="682" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600">
    Category 1 -----&lt; Product
  </text>
</svg>
